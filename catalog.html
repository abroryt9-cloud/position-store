{% extends "base.html" %}

{% block title %}Catalog - POSITION{% endblock %}

{% block content %}
<div class="container">
    <h1 style="font-size: 3rem; margin: 60px 0 30px;">Catalog</h1>
    
    <div style="margin-bottom: 40px;">
        <a href="/catalog?category=all" class="btn" style="margin-right: 10px;">All</a>
        <a href="/catalog?category=oxford" class="btn" style="margin-right: 10px;">Oxford</a>
        <a href="/catalog?category=zipneck" class="btn">Zip Neck</a>
    </div>
    
    <div class="products-grid">
        {% for product in products %}
        <div class="product-card">
            <a href="/product/{{ product.slug }}" style="text-decoration: none; color: inherit;">
                <img src="https://via.placeholder.com/500x600?text=POSITION" alt="{{ product.name }}">
                <h3>{{ product.name }}</h3>
                <p style="color: #6B2E3A;">{{ product.color }}</p>
                <p class="price">$ {{ product.price_usd }}</p>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
